[env:arduino mega]
platform = atmelavr
board = megaatmega2560
framework = arduino
lib_deps = 
	mike-matera/ArduinoSTL@^1.1.0
	bblanchon/ArduinoTrace@^1.2.0
	malachi-iot/estdlib@^0.1.6
	adafruit/SD@0.0.0-alpha+sha.041f788250
	arduino-libraries/Servo@^1.1.8
	thijse/ArduinoLog@^1.1.1
